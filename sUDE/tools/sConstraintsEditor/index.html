<!DOCTYPE html>
<html>

<head>
	<title>sUDE | sConstraintsEditor</title>
	<meta charset="UTF-8">
	<link rel="stylesheet" href="/sUDE/css/style.css">
	<script src="/sUDE/js/highlight.js"></script>
	<script src="editor.js"></script>
</head>

<body>
	<header>
		<nav aria-label="breadcrumb">
			<a href="/">Home</a>
			<a href="/sUDE">sUDE</a>
			<a href="/sUDE/tools">Tools</a>
			<a href="" aria-current="page">sConstraintsEditor</a>
		</nav>
	</header>
	<main>
		<table role="grid" class="constraintEditorGrid">
			<tr>
				<td>
					<label for="mod">
						<select id="mod" onchange="onModChange(`${this.options[this.selectedIndex].value}`)">
							<option value="">Select a mod</option>
							<option value="sGunplay">sGunplay</option>
							<option value="sVisual">sVisual</option>
						</select>
					</label>
				</td>
				<td>
					<a id="downloadCode" role="button">Download</a>
					<a id="copyCode" role="button" onclick="copyToClipboard()" href="#">Copy to clipboard</a>
				</td>
			</tr>
			<tr>
				<td>
					<form id="constraints_options" onchange="updateOutputJson()">

					</form>
				</td>
				<td>
					<pre><code id="output_json" class="language-json"></code></pre>
				</td>
			</tr>
		</table>
	</main>
</body>

</html>
